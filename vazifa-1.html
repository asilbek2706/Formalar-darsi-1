    <title>CRM: Foydalanuvchilarni boshqarish tizimi</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            text-align: left;
        }

        th, td {
            padding: 10px;
            border: 1px solid black;
        }

        #birinchi {
            color: red;
        }

        .ikkinchi {
            color: yellow;
            font-size: 25px;
        }

    </style>
</head>
<body>
<!--Bu forma-->
<div class="form-container">
    <form>
        <label for="username" id="birinchi">Username:</label>
        <input type="text" id="username" name="username"><br><br>

        <label for="email" class="ikkinchi">Email: </label>
        <input type="email" id="email" name="email"><br><br>

        <label for="date">Tugilga kun</label>
        <input type="date" id="date" name="date"><br><br>

        <label for="phone">Telefon: </label>
        <input type="tel" id="phone" name="phone"><br><br>

        <button type="submit">Ro'yhatga qoshish</button>
    </form>
</div>
