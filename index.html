<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formalar</title>
</head>
<body>

    <h1>Formalar</h1>

<form action="/server.py" method="POST">
    <div>
        <label for="username">Username:</label>
        <input type="text" name="username" id="username">
    </div>
    <br>
    <div>
        <label for="parol">Password:</label>
        <input type="password" name="parol" id="parol">
    </div>
    <br>
    <div>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email">
    </div>
    <br>
    <div>
        <label for="birthday">Tug'ilgan kun:</label>
        <input type="date" name="birthday" id="birthday">
    </div>
    <br>
    <div>
        <label for="phone">Telefon raqam:</label>
        <input type="tel" name="phone" id="phone">
    </div>
    <br>
    <div>
        <label for="zip-code">Tuman Zip kodi:</label>
        <input type="number" name="zip-code" id="zip-code">
    </div>

    <br>
    <div>
        <button type="submit">Register</button>
    </div>
</form>

</body>
</html>
