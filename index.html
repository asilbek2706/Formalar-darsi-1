<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formalar</title>
</head>
<body>

<h1>Formalar</h1>

<form action="/server.py" method="POST">
    <div>
        <label for="username">Username:</label>
        <input type="text" name="username" id="username">
    </div>
    <br>
    <div>
        <label for="parol">Password:</label>
        <input type="password" name="parol" id="parol">
    </div>
    <br>
    <div>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email">
    </div>
    <br>
    <div>
        <input type="date" name="birthday" id="birthday">
        <label for="birthday">=>Tug'ilgan kun</label>
    </div>
    <br>
    <div>
        <label for="phone">Telefon raqam:</label>
        <input type="tel" name="phone" id="phone">
    </div>
    <br>
    <div>
        <label for="zip-code">Tuman Zip kodi:</label>
        <input type="number" name="zip-code" id="zip-code">
    </div>

    <br>
    <div>
        <button type="submit">Register</button>
    </div>

    <br>

    <div>
        <h4>Bu checkbox</h4>

        <label for="news">Birinchi</label>
        <input type="checkbox" name="new" id="news">

        <br>

        <input type="checkbox" name="new" id="new">
        <label for="new">Ikkinchi</label>
    </div>
    <br>
    <br>
    <div>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Erkak</label>

        <input type="radio" name="gender" id="female" value="male">
        <label for="female">Ayol</label>
    </div>

    <br>
    <select name="ishlash-vaqti">
        <option value="0">Tajriba tanlang:</option>
        <option value="1">1 yil tajribalik</option>
        <option value="2">2 yil tajribalik</option>
        <option value="5">5 yil tajribalik</option>
        <option value="6">6 yil tajribalik</option>
    </select>

    <br>
    <br>
    <hr>

    <textarea cols="100" placeholder="Ozingiz haqingizda..." rows="10"></textarea>

</form>

</body>
</html>
